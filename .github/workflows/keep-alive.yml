name: Supabase Keep-Alive & Auto-Restore

# Free, two-layer defense against Supabase Free-Plan auto-pausing of homebake-app.
#
#   1. AUTO-RESTORE (the guarantee): if the project is paused, immediately call
#      the Management API restore endpoint. Recovery is automatic and downtime
#      is capped at the trigger interval (~6h) instead of days. This is what
#      actually keeps the app coming back, regardless of why it paused.
#
#   2. WRITE KEEP-ALIVE (reduces frequency): when the project is active, run a
#      real DB write (updates public.keep_alive) via the Management API query
#      endpoint. A write registers as genuine database activity — the thing the
#      Free-Plan inactivity check tracks — so pauses happen less often. (Note:
#      Supabase reserves the right to pause Free projects regardless, which is
#      why layer 1 exists.)
#
# REQUIRED REPO SECRET:
#   SUPABASE_ACCESS_TOKEN  — a Supabase Personal Access Token with access to this
#     project. Create one at https://supabase.com/dashboard/account/tokens and add
#     it under Repo Settings → Secrets and variables → Actions → New repository secret.
#
# SCHEDULING: this workflow is driven entirely by an external cron-job.org job that
# POSTs a `keep-alive` repository_dispatch event every 6 hours. repository_dispatch
# is an event trigger (not a `schedule:` cron), so GitHub's 60-day idle-disable of
# scheduled workflows does NOT apply — it keeps running even if the repo sits idle.
# To trigger manually, use the Actions tab "Run workflow" button (workflow_dispatch).

on:
  repository_dispatch:       # external trigger (cron-job.org) on a 6-hour schedule —
    types: [keep-alive]      # NOT subject to GitHub's 60-day idle-disable rule
  workflow_dispatch:         # manual trigger from the GitHub UI

permissions:
  contents: read

concurrency:
  group: supabase-keep-alive
  cancel-in-progress: false

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    env:
      PROJECT_REF: fciokvdmrwdjxshjapdu
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - name: Check status, restore if paused, else write keep-alive ping
        run: |
          set -euo pipefail

          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN secret is not set. See workflow header."
            exit 1
          fi

          API="https://api.supabase.com/v1/projects/${PROJECT_REF}"
          AUTH="Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}"

          status=$(curl -fsS -H "${AUTH}" "${API}" | jq -r '.status')
          echo "Current project status: ${status}"

          case "${status}" in
            ACTIVE_HEALTHY)
              echo "Active — sending write keep-alive ping."
              code=$(curl -s -o /tmp/q.out -w "%{http_code}" -X POST \
                -H "${AUTH}" -H "Content-Type: application/json" \
                "${API}/database/query" \
                -d '{"query":"update public.keep_alive set last_ping = now() where id = 1;"}')
              echo "Query HTTP ${code}"; cat /tmp/q.out || true
              if [ "${code}" -lt 200 ] || [ "${code}" -ge 300 ]; then
                echo "::error::Keep-alive write failed (HTTP ${code})"
                exit 1
              fi
              echo "Keep-alive write succeeded."
              ;;
            INACTIVE|PAUSED|PAUSE_FAILED)
              echo "::warning::Project is ${status} — triggering auto-restore."
              code=$(curl -s -o /tmp/r.out -w "%{http_code}" -X POST \
                -H "${AUTH}" -H "Content-Type: application/json" \
                "${API}/restore" -d '{}')
              echo "Restore HTTP ${code}"; cat /tmp/r.out || true
              if [ "${code}" -lt 200 ] || [ "${code}" -ge 300 ]; then
                echo "::error::Restore request failed (HTTP ${code})"
                exit 1
              fi
              echo "Restore requested — project will come up shortly; next run will ping."
              ;;
            *)
              echo "Transitional status (${status}) — no action this run."
              ;;
          esac
